<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>July 2 — Year Up United</title>
    <link rel="stylesheet" href="/StyleSheet/stylesheet.css" />
  </head>
  <body id="4">
    <div class="page">

      <a href="/Pages/facilitation.HTML" class="back-link" style="text-decoration:none; color:black">← Back to schedule</a>

      <div class="meeting-tag">Thursday · All Hands</div>
      <div class="meeting-title">July 2 Meeting</div>
      <div class="meeting-sub">Leads: Robyn &nbsp;·&nbsp; Nobinur &nbsp;·&nbsp; Gerald &nbsp;·&nbsp; Everyone has a part</div>

      <div class="name-section">
        <label>Who are you?</label>
        <div class="name-row" id="nameForm">
          <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="30" />
          <button onclick="setName()">Confirm</button>
        </div>
        <div class="active-name" id="activeName" style="display:none">
          Picking as: <span id="nameDisplay"></span>
          <a onclick="clearName()">change</a>
        </div>
      </div>

      <div class="section-label">Roles — pick one</div>
      <div class="roles" id="roleList">
        <div style="font-size:14px;color:#888780;padding:1rem 0">Loading roles...</div>
      </div>

      <div class="status-bar">
        <button class="refresh-btn" onclick="loadRoles()">↻ Refresh</button>
        <span id="statusText"></span>
        <button class="reset-btn" onclick="resetAll()">Reset all</button>
      </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
      const SUPABASE_URL = 'https://hbltngjudpwloiosyjbq.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhibHRuZ2p1ZHB3bG9pb3N5amJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MjUxOTgsImV4cCI6MjA5NjIwMTE5OH0.njFF4XHMy_M8SN0BVXp5M7dFdNe8Ceu8hrSY3sP1DuU';
      const MEETING = 'july2';
 
      const ROLES = [
        { name: 'Warm-Up Question', time: '5 mins' },
        { name: 'Community Norms', time: '5 mins' },
        { name: 'Recap & Reflection', time: '5 mins' },
        { name: 'Video', time: '10 mins' },
        { name: 'Interactive', time: '15 mins' },
        { name: 'Processing', time: '10 mins' },
        { name: 'Break (optional)', time: '5 mins' },
        { name: 'Contract', time: '5 mins', pm: true },
        { name: 'Feedback', time: '15 mins' },
        { name: 'Plus/Delta', time: '10 mins' },
        { name: 'Announcements', time: '5 mins' },
      ];
 
      let myName = '';
      let roleData = [];
 
      function headers() {
        return {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json'
        };
      }
 
      async function loadRoles() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/roles?meeting=eq.${MEETING}&select=*`, { headers: headers() });
        roleData = await res.json();
        renderRoles();
      }
 
      function renderRoles() {
        const claimable = ROLES.filter(r => !r.pm).length;
        const taken = roleData.filter(r => r.claimed_by).length;
        document.getElementById('statusText').textContent = `${taken} of ${claimable} roles claimed`;
 
        const html = ROLES.map(role => {
          if (role.pm) {
            return `<div class="role-card pm">
              <div>
                <div class="role-name">${role.name}</div>
                <div class="role-time">${role.time}</div>
              </div>
              <div class="role-right"><span class="pm-badge">PM Daniel</span></div>
            </div>`;
          }
 
          const row = roleData.find(r => r.role_name === role.name);
          const owner = row ? row.claimed_by : null;
          const isMe = owner && owner.toLowerCase() === myName.toLowerCase();
          const isTaken = !!owner && !isMe;
 
          let cardClass = 'role-card';
          if (isMe) cardClass += ' mine';
          else if (isTaken) cardClass += ' taken';
 
          const rightHtml = isMe
            ? `<span class="owner me">✓ ${myName}</span><button class="release-btn" onclick="release('${role.name}')">Release</button>`
            : isTaken
              ? `<span class="owner">${owner}</span>`
              : `<button class="claim-btn" ${!myName ? 'disabled title="Enter your name first"' : ''} onclick="claim('${role.name}')">Claim</button>`;
 
          return `<div class="${cardClass}">
            <div>
              <div class="role-name">${role.name}</div>
              <div class="role-time">${role.time}</div>
            </div>
            <div class="role-right">${rightHtml}</div>
          </div>`;
        }).join('');
 
        document.getElementById('roleList').innerHTML = html;
      }
 
      async function claim(roleName) {
        if (!myName) return;
        const row = roleData.find(r => r.role_name === roleName);
        if (row && row.claimed_by) { showToast('Already taken!'); return; }
 
        if (row) {
          await fetch(`${SUPABASE_URL}/rest/v1/roles?id=eq.${row.id}`, {
            method: 'PATCH',
            headers: { ...headers(), 'Prefer': 'return=minimal' },
            body: JSON.stringify({ claimed_by: myName })
          });
        } else {
          await fetch(`${SUPABASE_URL}/rest/v1/roles`, {
            method: 'POST',
            headers: { ...headers(), 'Prefer': 'return=minimal' },
            body: JSON.stringify({ meeting: MEETING, role_name: roleName, claimed_by: myName })
          });
        }
        showToast('Role claimed!');
        loadRoles();
      }
 
      async function release(roleName) {
        const row = roleData.find(r => r.role_name === roleName);
        if (!row) return;
        await fetch(`${SUPABASE_URL}/rest/v1/roles?id=eq.${row.id}`, {
          method: 'PATCH',
          headers: { ...headers(), 'Prefer': 'return=minimal' },
          body: JSON.stringify({ claimed_by: null })
        });
        showToast('Role released');
        loadRoles();
      }
 
      async function resetAll() {
        if (!confirm('Clear all claimed roles for this meeting?')) return;
        await fetch(`${SUPABASE_URL}/rest/v1/roles?meeting=eq.${MEETING}`, {
          method: 'PATCH',
          headers: { ...headers(), 'Prefer': 'return=minimal' },
          body: JSON.stringify({ claimed_by: null })
        });
        showToast('All roles reset');
        loadRoles();
      }
 
      function setName() {
        const val = document.getElementById('nameInput').value.trim();
        if (!val) return;
        myName = val;
        document.getElementById('nameDisplay').textContent = val;
        document.getElementById('nameForm').style.display = 'none';
        document.getElementById('activeName').style.display = 'block';
        renderRoles();
      }
 
      function clearName() {
        myName = '';
        document.getElementById('nameForm').style.display = 'flex';
        document.getElementById('activeName').style.display = 'none';
        document.getElementById('nameInput').value = '';
        renderRoles();
      }
 
      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
      }
 
      loadRoles();
      setInterval(loadRoles, 8000);
    </script>
  </body>
</html>
